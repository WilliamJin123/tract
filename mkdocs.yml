      - Branching & Merge: guides/branching-and-merge.md
      - Compression: guides/compression.md
      - Middleware: guides/middleware.md
      - Semantic Gates: guides/gates.md
      - Semantic Maintainers: guides/maintainers.md
      - Templates & Profiles: guides/templates-and-profiles.md
      - Multi-Agent Sessions: guides/multi-agent.md
      - Persistence & Recovery: guides/persistence.md
      - Error Handling: guides/error-handling.md
  - Cookbook:
      - Overview: cookbook/index.md
      - Getting Started:
          - Quick Start: cookbook/getting-started.md
          - Config & Directives: cookbook/config-directives.md
          - Custom Tools: cookbook/custom-tools.md
          - Streaming: cookbook/streaming.md
          - Async: cookbook/async.md
          - Agent Loop: cookbook/agent-loop.md
      - Agent Patterns:
          - Branching Strategies: cookbook/branching.md
          - Self-Correction: cookbook/self-correction.md
          - Staged Workflows: cookbook/staged-workflows.md
          - Multi-Agent: cookbook/multi-agent.md
          - Supervisor-Worker: cookbook/supervisor-worker.md
      - Workflows:
          - Coding Assistant: cookbook/coding-assistant.md
          - E-Commerce Pipeline: cookbook/ecommerce.md
          - Adversarial Review: cookbook/adversarial-review.md
  - API Reference:
      - Tract: reference/tract.md
      - Models:
          - Content Types: reference/content.md
          - Config: reference/config.md
          - Annotations: reference/annotations.md
          - Commit: reference/commit.md
      - CompiledContext: reference/compiled.md
      - Middleware: reference/middleware.md
      - Gate: reference/gate.md
      - Maintainer: reference/maintain.md
      - Templates: reference/templates.md
      - Profiles: reference/profiles.md
      - Session: reference/session.md
      - Formatting: reference/formatting.md
      - LLM Clients:
